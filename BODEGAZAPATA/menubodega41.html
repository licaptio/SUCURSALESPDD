<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Inicio - Bodega Zapata</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .contenedor {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }

    .logo {
      width: 95px;
      height: 95px;
      object-fit: contain;
      margin-bottom: 15px;
      border-radius: 16px;
      background: white;
      padding: 8px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitulo {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 28px;
    }

    .menu {
      display: grid;
      gap: 16px;
    }

    .boton {
      display: block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 18px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35);
    }

    .boton:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .boton.secundario {
      background: #16a34a;
      box-shadow: 0 8px 20px rgba(22,163,74,0.35);
    }

    .boton.secundario:hover {
      background: #15803d;
    }

    .footer {
      margin-top: 26px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="contenedor">

    <img src="logo.jfif" alt="Logo" class="logo">

    <h1>Bodega Zapata</h1>
    <div class="subtitulo">Menú principal de salidas</div>

    <div class="menu">
      <a class="boton" href="TABLA.html">
        Ver listado de salidas
      </a>

      <a class="boton secundario" href="LISTADOCODIGOSALIDA.html">
        Buscar salidas por código o concepto
      </a>
    </div>

    <div class="footer">
      PROVSOFT · SUCURSALESPDD / BODEGAZAPATA
    </div>

  </div>
</body>
</html>
