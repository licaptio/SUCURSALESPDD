<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PDD Móvil Exacta - PROVSOFT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --azul:#00416A;
  --azul-oscuro:#003366;
  --rojo:#e31b23;
  --verde:#16a34a;
  --gris-fondo:#f4f7fa;
  --border:#d1d9e0;
  --texto:#1f2937;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--gris-fondo);
  color:var(--texto);
}

.loading{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,var(--azul-oscuro),#001f3f);
  color:white;
  z-index:99999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:25px;
  text-align:center;
}

.loading-card{
  width:100%;
  max-width:390px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:24px;
  padding:25px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.loading-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:8px;
}

.loading-sub{
  font-size:13px;
  opacity:.9;
  margin-bottom:18px;
}

.progress-wrap{
  width:100%;
  height:14px;
  background:rgba(255,255,255,.18);
  border-radius:99px;
  overflow:hidden;
  margin:14px 0;
}

.progress-bar{
  width:0%;
  height:100%;
  background:white;
  border-radius:99px;
  transition:.25s;
}

#loadingPct{
  font-size:24px;
  font-weight:900;
}

#loadingText{
  font-size:13px;
  opacity:.95;
  margin-top:8px;
  min-height:35px;
}

.titulo-app{
  background:var(--azul-oscuro);
  color:#fff;
  text-align:center;
  font-weight:900;
  font-size:14px;
  padding:6px;
  letter-spacing:1px;
}

.top-header{
  height:60px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:0 10px;
}

.logo-area{
  display:flex;
  align-items:center;
  max-width:50%;
}

.logo-area img{
  max-height:45px;
  width:auto;
  display:block;
}

.logo-placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:2px solid var(--rojo);
  border-radius:20px;
  padding:2px 8px;
}

.logo-placeholder .main-text{
  color:var(--rojo);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
}

.logo-placeholder .sub-text{
  color:var(--rojo);
  font-size:5px;
  font-weight:700;
  text-transform:uppercase;
  border-top:1px solid var(--rojo);
  width:100%;
  text-align:center;
}

.sucursal-header{
  font-size:12px;
  font-weight:800;
  color:var(--azul-oscuro);
  text-align:center;
  flex:1;
}

.folio-header{
  background:var(--azul-oscuro);
  border-radius:30px;
  padding:4px 10px;
  text-align:center;
  min-width:90px;
}

.folio-header small{
  font-size:8px;
  color:white;
  display:block;
  opacity:.8;
  letter-spacing:.5px;
}

.folio-header #folioText{
  font-size:11px;
  font-weight:800;
  color:white;
}

.app-container{
  display:flex;
  flex-direction:column;
  height:calc(100vh - 60px);
  overflow:hidden;
  padding:8px;
  gap:8px;
}

.resumen-barra{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  border-radius:16px;
  padding:8px 12px;
  border:1px solid var(--border);
  flex-shrink:0;
  box-shadow:0 2px 5px rgba(0,0,0,.03);
}

.stat-item{
  text-align:center;
  background:#f8fafc;
  padding:3px 8px;
  border-radius:30px;
}

.stat-label{
  font-size:8px;
  font-weight:800;
  color:#475569;
  text-transform:uppercase;
}

.stat-value{
  font-size:16px;
  font-weight:900;
  color:var(--azul-oscuro);
  line-height:1.2;
}

.total-monto{
  background:var(--verde);
  border-radius:40px;
  padding:4px 12px;
  text-align:center;
}

.total-monto.stat-value{
  color:white;
  font-size:16px;
}

.btn-finalizar-flotante{
  background:var(--rojo);
  color:white;
  border:none;
  border-radius:40px;
  padding:8px 15px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(227,27,35,.2);
}

.main-work-area{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:hidden;
}

.captura-card{
  background:white;
  border-radius:20px;
  border:1px solid var(--border);
  padding:12px;
  flex-shrink:0;
  box-shadow:0 2px 5px rgba(0,0,0,.02);
}

.search-row{
  display:grid;
  grid-template-columns:1fr 90px;
  gap:10px;
  margin-bottom:10px;
}

.search-container input,
.cantidad-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:16px;
  background:#fdfdfd;
}

.prod-selected-box{
  background:#f0f9ff;
  border:1px solid #bae6fd;
  border-radius:12px;
  padding:8px;
  margin-bottom:10px;
  font-size:12px;
  color:var(--azul-oscuro);
  min-height:40px;
  display:flex;
  align-items:center;
  font-weight:500;
}

.lista-container{
  background:white;
  border-radius:20px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  flex:1;
}

.table-container{
  overflow-y:auto;
  flex:1;
  padding:0 5px;
}

.item-row{
  display:grid;
  grid-template-columns:1fr 60px 90px 35px;
  padding:10px 5px;
  border-bottom:1px solid #edf2f7;
  align-items:center;
  font-size:13px;
  gap:5px;
}

.btn-quitar{
  background:none;
  border:none;
  font-size:18px;
  color:var(--rojo);
  cursor:pointer;
  font-weight:bold;
}

.search-results{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  z-index:1000;
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  max-height:240px;
  overflow-y:auto;
  display:none;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.search-item{
  padding:10px;
  border-bottom:1px solid #f1f5f9;
  cursor:pointer;
  font-size:13px;
}

.search-item.active{
  background:#e0f2fe;
}

.badge-activo{
  color:#16a34a;
  font-weight:900;
  font-size:10px;
  margin-left:5px;
}

.badge-inactivo{
  color:#e31b23;
  font-weight:900;
  font-size:10px;
  margin-left:5px;
}

.acciones-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn-principal{
  background:var(--azul-oscuro);
  color:white;
  border:none;
  padding:12px;
  border-radius:25px;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
}

.btn-secundario{
  background:#f1f5f9;
  border:none;
  padding:12px;
  border-radius:25px;
  color:#64748b;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="loading" id="loading">
  <div class="loading-card">
    <div class="loading-title">PROVSOFT</div>
    <div class="loading-sub">Preparando solicitud de transferencia</div>
    <div id="loadingPct">0%</div>
    <div class="progress-wrap">
      <div id="loadingBar" class="progress-bar"></div>
    </div>
    <div id="loadingText">Iniciando aplicación...</div>
  </div>
</div>

<div class="titulo-app">
  SOLICITUD DE TRANSFERENCIA
</div>

<header class="top-header">
  <div class="logo-area">
    <img id="mainLogo" src="logo-proveedora.png" alt="La Proveedora"
         onerror="this.style.display='none'; document.getElementById('backupLogo').style.display='flex';">

    <div id="backupLogo" class="logo-placeholder" style="display:none;">
      <span class="main-text">PROVEEDORA</span>
      <span class="sub-text">DULCES - DESECHABLES</span>
    </div>
  </div>

  <div class="sucursal-header">ALLENDE 1</div>

  <div class="folio-header">
    <small>FOLIO SOLICITUD</small>
    <div id="folioText">Cargando...</div>
  </div>
</header>

<div class="app-container">

  <div class="resumen-barra">
    <div style="display:flex; gap:8px; align-items:center;">
      <div class="stat-item">
        <div class="stat-label">ITEMS</div>
        <div class="stat-value" id="countPartidas">0</div>
      </div>

      <div class="stat-item">
        <div class="stat-label">PZS</div>
        <div class="stat-value" id="countPiezas">0</div>
      </div>
    </div>

    <div id="totalEfectivo" class="total-monto stat-value">$0.00</div>

    <button id="btnFinalizarBarra" class="btn-finalizar-flotante">
      ✔ FINALIZAR
    </button>
  </div>

  <div class="main-work-area">

    <div class="captura-card">
      <div class="search-row">
        <div class="search-container" style="position:relative;">
          <input id="inpBusqueda" placeholder="Buscar código o nombre..." autocomplete="off">
          <div id="resSugerencias" class="search-results"></div>
        </div>

        <div class="cantidad-box">
          <input id="inpCantidad" type="number" value="1" min="0.001" step="0.001" inputmode="decimal">
        </div>
      </div>

      <div id="prodSelected" class="prod-selected-box">
        🛒 Toque para buscar producto...
      </div>

      <div class="acciones-row">
        <button id="btnAgregar" class="btn-principal">➕ AGREGAR</button>
        <button id="btnLimpiar" class="btn-secundario">🗑 LIMPIAR</button>
      </div>
    </div>

    <div class="lista-container">
      <div id="listaItems" class="table-container"></div>
    </div>

  </div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = [];
let catalogo = [];
let seleccionado = null;
let indexSeleccion = -1;

const SUCURSAL = "ALLENDE 1";
const RUTA_TRANSFERENCIAS = "transferencias1";

const DB_NAME = "PROVSOFT_PDD_MOVIL";
const DB_VERSION = 2;
const STORE_PRODUCTOS = "catalogo_productos_completo";
const STORE_META = "metadata";
const STORE_BORRADOR = "borrador_transferencia";

const CLAVE_ULTIMA_DESCARGA = "ultima_descarga_catalogo";
const CLAVE_BORRADOR = "borrador_actual";
const HORAS_ENTRE_DESCARGAS = 48;

const resSugerencias = document.getElementById("resSugerencias");
const inpBusqueda = document.getElementById("inpBusqueda");
const inpCantidad = document.getElementById("inpCantidad");
const prodSelected = document.getElementById("prodSelected");
const listaItems = document.getElementById("listaItems");
const btnAgregar = document.getElementById("btnAgregar");
const btnLimpiar = document.getElementById("btnLimpiar");
const btnFinalizarBarra = document.getElementById("btnFinalizarBarra");

function setLoading(txt, pct){
  document.getElementById("loadingText").innerText = txt;

  if(typeof pct === "number"){
    const p = Math.max(0, Math.min(100, pct));
    document.getElementById("loadingPct").innerText = `${p}%`;
    document.getElementById("loadingBar").style.width = `${p}%`;
  }
}

function ocultarLoading(){
  const loading = document.getElementById("loading");
  loading.style.opacity = "0";
  loading.style.transition = ".35s";

  setTimeout(() => {
    loading.style.display = "none";
  }, 380);
}

function abrirDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = e => {
      const dbi = e.target.result;

      if(!dbi.objectStoreNames.contains(STORE_PRODUCTOS)){
        dbi.createObjectStore(STORE_PRODUCTOS, { keyPath:"id" });
      }

      if(!dbi.objectStoreNames.contains(STORE_META)){
        dbi.createObjectStore(STORE_META, { keyPath:"key" });
      }

      if(!dbi.objectStoreNames.contains(STORE_BORRADOR)){
        dbi.createObjectStore(STORE_BORRADOR, { keyPath:"key" });
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function putStore(storeName, value){
  const dbi = await abrirDB();

  return new Promise((resolve, reject) => {
    const tx = dbi.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);

    store.put(value);

    tx.oncomplete = () => {
      dbi.close();
      resolve();
    };

    tx.onerror = () => {
      dbi.close();
      reject(tx.error);
    };
  });
}

async function getStore(storeName, key){
  const dbi = await abrirDB();

  return new Promise((resolve, reject) => {
    const tx = dbi.transaction(storeName, "readonly");
    const store = tx.objectStore(storeName);
    const req = store.get(key);

    req.onsuccess = () => {
      dbi.close();
      resolve(req.result || null);
    };

    req.onerror = () => {
      dbi.close();
      reject(req.error);
    };
  });
}

async function deleteStore(storeName, key){
  const dbi = await abrirDB();

  return new Promise((resolve, reject) => {
    const tx = dbi.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);

    store.delete(key);

    tx.oncomplete = () => {
      dbi.close();
      resolve();
    };

    tx.onerror = () => {
      dbi.close();
      reject(tx.error);
    };
  });
}

async function guardarCatalogoIndexedDB(data){
  const dbi = await abrirDB();

  return new Promise((resolve, reject) => {
    const tx = dbi.transaction(STORE_PRODUCTOS, "readwrite");
    const store = tx.objectStore(STORE_PRODUCTOS);

    store.clear();

    data.forEach(p => store.put(p));

    tx.oncomplete = () => {
      dbi.close();
      resolve();
    };

    tx.onerror = () => {
      dbi.close();
      reject(tx.error);
    };
  });
}

async function cargarCatalogoIndexedDB(){
  const dbi = await abrirDB();

  return new Promise((resolve, reject) => {
    const tx = dbi.transaction(STORE_PRODUCTOS, "readonly");
    const store = tx.objectStore(STORE_PRODUCTOS);
    const req = store.getAll();

    req.onsuccess = () => {
      dbi.close();
      resolve(req.result || []);
    };

    req.onerror = () => {
      dbi.close();
      reject(req.error);
    };
  });
}

async function guardarMeta(key, value){
  await putStore(STORE_META, { key, value });
}

async function leerMeta(key){
  const r = await getStore(STORE_META, key);
  return r ? r.value : null;
}

function debeActualizarCatalogo(ultimaDescarga){
  if(!ultimaDescarga) return true;

  const ultima = new Date(ultimaDescarga).getTime();
  const ahora = Date.now();
  const horas = (ahora - ultima) / 1000 / 60 / 60;

  return horas >= HORAS_ENTRE_DESCARGAS;
}

function normalizar(str){
  return String(str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function prepararProducto(d, id){
  const data = d || {};

  const codigo = String(data.codigoBarra || "").trim();
  const concepto = String(data.concepto || "").trim();
  const marca = String(data.marca || "").trim();
  const departamento = String(data.departamento || "").trim();

  const equivalentes = Array.isArray(data.codigosEquivalentes)
    ? data.codigosEquivalentes.map(x => String(x || "").trim()).filter(Boolean)
    : [];

  const textoBusqueda = [
    codigo,
    concepto,
    marca,
    departamento,
    ...equivalentes
  ].join(" ");

  return {
    id,
    ...data,
    codigoBarra: codigo,
    concepto,
    marca,
    departamento,
    codigosEquivalentes: equivalentes,
    activo: data.activo === true,
    precioPublico: Number(data.precioPublico || 0),
    _search: normalizar(textoBusqueda)
  };
}

async function cargarCatalogo(){
  try{
    setLoading("Abriendo base local IndexedDB...", 8);

    const local = await cargarCatalogoIndexedDB();

    if(local.length){
      catalogo = local;
      setLoading(`Catálogo local cargado: ${catalogo.length} productos`, 25);
    }else{
      setLoading("No hay catálogo local. Se descargará completo.", 18);
    }

    setLoading("Revisando fecha de actualización del catálogo...", 35);

    const ultimaDescarga = await leerMeta(CLAVE_ULTIMA_DESCARGA);
    const actualizar = debeActualizarCatalogo(ultimaDescarga);

    if(!actualizar && catalogo.length){
      setLoading(`Catálogo vigente. Próxima descarga después de 48 horas.`, 100);
      return;
    }

    setLoading("Descargando catálogo completo desde Firebase...", 50);

    const snap = await getDocs(
      collection(db, "productos")
    );

    catalogo = snap.docs.map(d => prepararProducto(d.data(), d.id));

    setLoading(`Guardando catálogo local: ${catalogo.length} productos...`, 78);

    await guardarCatalogoIndexedDB(catalogo);

    await guardarMeta(
      CLAVE_ULTIMA_DESCARGA,
      new Date().toISOString()
    );

    setLoading(`Catálogo actualizado: ${catalogo.length} productos`, 100);

  }catch(e){
    console.error("Error cargando catálogo:", e);

    const local = await cargarCatalogoIndexedDB();

    if(local.length){
      catalogo = local;
      setLoading(`Modo offline: usando ${catalogo.length} productos locales`, 100);
      alert("⚠️ Modo offline: usando catálogo guardado.");
    }else{
      setLoading("Error: no hay catálogo local ni conexión.", 0);
      alert("❌ Sin conexión y sin catálogo guardado.");
    }
  }
}

async function guardarBorrador(){
  const folioActual = document.getElementById("folioText").innerText || "";

  await putStore(STORE_BORRADOR, {
    key: CLAVE_BORRADOR,
    carrito,
    seleccionado:null,
    cantidad: inpCantidad.value,
    folio: folioActual,
    guardado_en: new Date().toISOString()
  });
}

async function recuperarBorrador(){
  const r = await getStore(STORE_BORRADOR, CLAVE_BORRADOR);

  if(!r || !Array.isArray(r.carrito) || !r.carrito.length){
    return;
  }

  const restaurar = confirm(
    `Se encontró una solicitud sin finalizar guardada automáticamente.\n\nPartidas: ${r.carrito.length}\nGuardado: ${new Date(r.guardado_en).toLocaleString("es-MX")}\n\n¿Deseas restaurarla?`
  );

  if(!restaurar){
    await deleteStore(STORE_BORRADOR, CLAVE_BORRADOR);
    return;
  }

  carrito = r.carrito || [];

  if(r.folio){
    document.getElementById("folioText").innerText = r.folio;
  }

  inpCantidad.value = r.cantidad || 1;
}

async function limpiarBorrador(){
  await deleteStore(STORE_BORRADOR, CLAVE_BORRADOR);
}

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#039;"
  })[m]);
}

function formatearCantidad(cant){
  const n = Number(cant || 0);

  if(Number.isInteger(n)) return String(n);

  return n.toLocaleString("es-MX", {
    minimumFractionDigits:0,
    maximumFractionDigits:3
  });
}

function nuevoFolio(){
  const d = new Date();

  const fol = `SOL-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}-${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}`;

  document.getElementById("folioText").innerText = fol;
}

function pintarSeleccion(items){
  items.forEach((el,i) => {
    el.classList.toggle("active", i === indexSeleccion);
  });
}

function cerrarSugerencias(){
  resSugerencias.style.display = "none";
  indexSeleccion = -1;
}

function mostrarSugerencias(sugerencias){
  if(!sugerencias.length){
    cerrarSugerencias();
    return;
  }

  resSugerencias.innerHTML = sugerencias.map((p,i) => `
    <div class="search-item" data-id="${escapeHtml(p.id)}" data-index="${i}">
      <b>${escapeHtml(p.codigoBarra)}</b> - ${escapeHtml(p.concepto)}
      <br>
      <small>
        ${escapeHtml(p.marca || "")}
        ${p.activo ? '<span class="badge-activo">ACTIVO</span>' : '<span class="badge-inactivo">INACTIVO</span>'}
      </small>
    </div>
  `).join("");

  resSugerencias.style.display = "block";
}

function seleccionarProducto(id){
  const prod = catalogo.find(x => String(x.id) === String(id));
  if(!prod) return;

  seleccionado = prod;

  prodSelected.innerHTML = `
    ✅ <strong>${escapeHtml(prod.concepto)}</strong>
    ($${Number(prod.precioPublico || 0).toFixed(2)})
    ${prod.activo ? '<span class="badge-activo">ACTIVO</span>' : '<span class="badge-inactivo">INACTIVO</span>'}
  `;

  inpBusqueda.value = "";
  cerrarSugerencias();

  inpCantidad.focus();
  inpCantidad.select();
}

async function agregarProducto(){
  if(!seleccionado){
    alert("Por favor, seleccione un producto primero.");
    inpBusqueda.focus();
    return;
  }

  let cant = parseFloat(String(inpCantidad.value).replace(",", "."));

  if(!Number.isFinite(cant) || cant <= 0){
    cant = 1;
  }

  const existente = carrito.find(i => i.id === seleccionado.id);

  if(existente){
    existente.cantidad = Number(existente.cantidad) + cant;
  }else{
    carrito.unshift({
      id: seleccionado.id,
      codigo: seleccionado.codigoBarra,
      nombre: seleccionado.concepto,
      activo: seleccionado.activo === true,
      cantidad: cant,
      precio: Number(seleccionado.precioPublico || 0)
    });
  }

  if(navigator.vibrate) navigator.vibrate(50);

  actualizarUI();
  await guardarBorrador();
  resetCaptura();
}

function resetCaptura(){
  seleccionado = null;
  indexSeleccion = -1;
  prodSelected.innerHTML = "🛒 Toque para buscar producto...";
  inpCantidad.value = 1;
  inpBusqueda.value = "";
  cerrarSugerencias();
  inpBusqueda.focus();
}

function actualizarUI(){
  let total = 0;
  let pzs = 0;

  if(!carrito.length){
    listaItems.innerHTML = `
      <div style="padding:40px 20px; text-align:center; color:#94a3b8; font-style:italic; font-size:13px;">
        🛒 El carrito está vacío
      </div>
    `;
  }else{
    listaItems.innerHTML = carrito.map((item,idx) => {
      const subtotal = Number(item.cantidad) * Number(item.precio);

      total += subtotal;
      pzs += Number(item.cantidad);

      return `
        <div class="item-row">
          <div>
            <b>${escapeHtml(item.nombre)}</b><br>
            <small>
              ${escapeHtml(item.codigo)}
              ${item.activo ? '<span class="badge-activo">ACTIVO</span>' : '<span class="badge-inactivo">INACTIVO</span>'}
            </small>
          </div>

          <div style="text-align:center; font-weight:800; color:var(--azul-oscuro); font-size:15px;">
            ${formatearCantidad(item.cantidad)}
          </div>

          <div style="text-align:right; font-weight:600;">
            $${subtotal.toFixed(2)}
          </div>

          <button class="btn-quitar" onclick="eliminar(${idx})">✕</button>
        </div>
      `;
    }).join("");
  }

  document.getElementById("countPartidas").innerText = carrito.length;
  document.getElementById("countPiezas").innerText = formatearCantidad(pzs);
  document.getElementById("totalEfectivo").innerText =
    `$${total.toLocaleString("es-MX", { minimumFractionDigits:2, maximumFractionDigits:2 })}`;
}

window.eliminar = async (idx) => {
  if(navigator.vibrate) navigator.vibrate(30);

  carrito.splice(idx, 1);

  actualizarUI();
  await guardarBorrador();

  inpBusqueda.focus();
};

inpBusqueda.addEventListener("input", e => {
  const txt = normalizar(e.target.value);

  seleccionado = null;
  indexSeleccion = -1;

  if(txt.length < 2){
    cerrarSugerencias();
    prodSelected.innerHTML = "🛒 Toque para buscar producto...";
    return;
  }

  const exacto = catalogo.find(p =>
    normalizar(p.codigoBarra) === txt ||
    (
      Array.isArray(p.codigosEquivalentes) &&
      p.codigosEquivalentes.some(c => normalizar(c) === txt)
    )
  );

  if(exacto){
    seleccionarProducto(exacto.id);
    return;
  }

  const palabras = txt.split(/\s+/).filter(Boolean);

  const sugerencias = catalogo
    .map(p => {
      let score = 0;

      if(p._search.includes(txt)) score += 100;

      palabras.forEach(w => {
        if(p._search.includes(w)) score += 25;
      });

      if(normalizar(p.codigoBarra).startsWith(txt)) score += 80;
      if(normalizar(p.concepto).includes(txt)) score += 50;

      return { ...p, score };
    })
    .filter(p => p.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0,12);

  mostrarSugerencias(sugerencias);
});

inpBusqueda.addEventListener("keydown", e => {
  const items = Array.from(document.querySelectorAll(".search-item"));

  if(e.key === "ArrowDown"){
    if(!items.length) return;

    e.preventDefault();
    indexSeleccion = (indexSeleccion + 1) % items.length;
    pintarSeleccion(items);
    return;
  }

  if(e.key === "ArrowUp"){
    if(!items.length) return;

    e.preventDefault();
    indexSeleccion = (indexSeleccion - 1 + items.length) % items.length;
    pintarSeleccion(items);
    return;
  }

  if(e.key === "Enter"){
    e.preventDefault();

    if(seleccionado){
      inpCantidad.focus();
      inpCantidad.select();
      return;
    }

    if(items.length && indexSeleccion >= 0 && items[indexSeleccion]){
      seleccionarProducto(items[indexSeleccion].dataset.id);
      return;
    }

    if(items.length === 1){
      seleccionarProducto(items[0].dataset.id);
    }
  }
});

inpCantidad.addEventListener("keydown", e => {
  if(e.key === "Enter"){
    e.preventDefault();
    agregarProducto();
  }
});

inpCantidad.addEventListener("input", () => {
  guardarBorrador();
});

resSugerencias.addEventListener("click", e => {
  const item = e.target.closest(".search-item");
  if(!item) return;

  seleccionarProducto(item.dataset.id);
});

document.addEventListener("click", e => {
  if(!e.target.closest(".search-container")){
    cerrarSugerencias();
  }
});

btnAgregar.onclick = agregarProducto;
btnLimpiar.onclick = resetCaptura;

btnFinalizarBarra.onclick = async () => {
  if(carrito.length === 0){
    alert("El carrito está vacío.");
    return;
  }

  const totalFinal = carrito.reduce((a,b) => {
    return a + (Number(b.cantidad) * Number(b.precio));
  }, 0);

  if(totalFinal <= 0){
    alert("Total de la solicitud inválido.");
    return;
  }

  if(!confirm("¿Confirmar envío de solicitud?")) return;

  const btn = btnFinalizarBarra;
  const fol = document.getElementById("folioText").innerText;
  const usuario = "";

  try{
    btn.disabled = true;

    await setDoc(
      doc(db, "TIENDAS", SUCURSAL, RUTA_TRANSFERENCIAS, fol),
      {
        folio: fol,
        items: carrito,
        capturista: usuario,
        origen: SUCURSAL,
        total: totalFinal,
        fecha: new Date().toISOString()
      }
    );

    generarPDF(fol, SUCURSAL, carrito, usuario);

    carrito = [];

    await limpiarBorrador();

    actualizarUI();
    nuevoFolio();
    resetCaptura();

    alert("Enviado con éxito a Firebase.");

  }catch(e){
    console.error(e);
    alert("Error de conexión al guardar en Firebase.");
  }finally{
    btn.disabled = false;
  }
};

function generarPDF(folio, sucursal, items, usuario){
  const { jsPDF } = window.jspdf;
  const docPdf = new jsPDF();

  docPdf.text("PROVEEDORA - SOLICITUD PDD", 14, 15);
  docPdf.setFontSize(10);
  docPdf.text(`Folio: ${folio} | Sucursal: ${sucursal}`, 14, 22);

  docPdf.autoTable({
    startY:30,
    head:[["Código","Descripción","Cant","Precio","Subtotal","Estado"]],
    body:items.map(i => [
      i.codigo,
      String(i.nombre).substring(0,30),
      formatearCantidad(i.cantidad),
      `$${Number(i.precio).toFixed(2)}`,
      `$${(Number(i.cantidad) * Number(i.precio)).toFixed(2)}`,
      i.activo ? "ACTIVO" : "INACTIVO"
    ])
  });

  const finalY = docPdf.lastAutoTable.finalY + 10;

  const totalGeneral = items.reduce((a,b) => {
    return a + (Number(b.cantidad) * Number(b.precio));
  },0);

  const totalPiezas = items.reduce((a,b) => {
    return a + Number(b.cantidad);
  },0);

  docPdf.text(`TOTAL PIEZAS FÍSICAS: ${formatearCantidad(totalPiezas)}`, 14, finalY);
  docPdf.text(`TOTAL MONTO SOLICITUD: $${totalGeneral.toFixed(2)}`, 14, finalY + 6);

  docPdf.save(`${folio}.pdf`);
}

async function iniciar(){
  setLoading("Generando folio...", 5);

  nuevoFolio();

  await cargarCatalogo();

  setLoading("Revisando solicitud guardada...", 92);

  await recuperarBorrador();

  actualizarUI();

  setLoading("Aplicación lista.", 100);

  setTimeout(() => {
    ocultarLoading();
    inpBusqueda.focus();
  }, 500);
}

window.addEventListener("beforeunload", () => {
  if(carrito.length){
    guardarBorrador();
  }
});

window.seleccionarProducto = seleccionarProducto;

await iniciar();
</script>
