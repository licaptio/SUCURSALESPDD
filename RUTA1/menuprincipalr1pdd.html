      background:linear-gradient(135deg,#7a0000,#d71920,#ffffff);

    }

      border-radius:15px;
      font-size:15px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(180deg,#e32525,#8f0000);
      box-shadow:0 6px 14px rgba(140,0,0,.25);
      cursor:pointer;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn.sec{
      background:linear-gradient(180deg,#ffffff,#f1f1f1);
      color:#a00000;
      border:2px solid #d71920;
    }

    .footer{
      flex-shrink:0;
      margin-top:8px;
      font-size:12px;
      color:#777;
      font-weight:700;
    }

    @media (max-height:650px){
      h1{font-size:23px}
      h2{font-size:13px;margin-bottom:6px}
      .btn{min-height:42px;font-size:13px}
      .menu{gap:6px}
      .container{padding:12px;border-radius:18px}
    }

</head>
