  <title>Menú de Apps – PROVSOFT</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Segoe UI',Arial,sans-serif;
      background:#f4f6f9;
      color:#222;
    }

    header{
      padding:28px 18px;
      text-align:center;
      background:linear-gradient(135deg,#8b0000,#c40000,#ffcc00);
      color:white;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    header h1{
      margin:0;
      font-size:30px;
      font-weight:800;
      letter-spacing:.5px;
    }

    header p{
      margin:8px 0 0;
      font-size:14px;
      font-weight:600;
      opacity:.95;
    }

    main{
      max-width:1200px;
      margin:30px auto;
      padding:0 18px;
    }

    .apps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:18px;
    }

    .app{
      display:flex;
      align-items:center;
      gap:14px;
      min-height:82px;
      padding:18px;
      border-radius:18px;
      text-decoration:none;
      background:white;
      color:#333;
      font-weight:800;
      font-size:15px;
      box-shadow:0 6px 18px rgba(0,0,0,.10);
      border-left:7px solid #ffcc00;
      transition:.18s ease;
    }

    .app:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      border-left-color:#c40000;
    }

    .icon{
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      background:linear-gradient(135deg,#ffcc00,#ffb300);
      font-size:22px;
      flex-shrink:0;
    }

    footer{
      text-align:center;
      margin:35px 0 20px;
      font-size:13px;
      color:#777;
      font-weight:600;
    }

    footer b{
      color:#c40000;
    }

    @media(max-width:600px){
      header h1{
        font-size:24px;
      }

      main{
        margin-top:22px;
      }

      .app{
        min-height:74px;
        padding:15px;
        font-size:14px;
      }

      .icon{
        width:40px;
        height:40px;
        font-size:20px;
      }
    }
  </style>
</head>
