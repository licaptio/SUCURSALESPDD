<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVSOFT | Cigarro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:linear-gradient(135deg,#003b63,#0b6fa4);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.app{
  width:100%;
  height:100%;
  max-width:1200px;
  padding:28px;
  display:flex;
  flex-direction:column;
}

.header{
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  flex-shrink:0;
}

.header img{
  width:58px;
  height:58px;
  object-fit:contain;
  background:#fff;
  border-radius:14px;
  padding:5px;
}

.tituloPrincipal{
  line-height:1.1;
}

.tituloPrincipal h1{
  margin:0;
  font-size:30px;
  letter-spacing:.5px;
}

.tituloPrincipal div{
  margin-top:5px;
  font-size:14px;
  opacity:.85;
}

.menu{
  flex:1;
  display:grid;
  grid-template-columns:repeat(2, minmax(220px, 360px));
  align-content:center;
  justify-content:center;
  gap:26px;
}

.card{
  height:210px;
  background:#fff;
  color:#1f2937;
  border-radius:22px;
  padding:26px;
  box-shadow:0 14px 34px rgba(0,0,0,.28);
  cursor:pointer;
  border:none;
  text-align:left;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.15s ease;
}

.card:hover{
  transform:translateY(-3px);
}

.icono{
  width:62px;
  height:62px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:#fff;
}

.titulo{
  font-size:24px;
  font-weight:800;
  margin-top:18px;
}

.desc{
  margin-top:8px;
  font-size:15px;
  color:#555;
}

.abrir{
  margin-top:18px;
  font-size:15px;
  font-weight:800;
  color:#0b6fa4;
}

.footer{
  height:34px;
  text-align:center;
  font-size:13px;
  opacity:.8;
  flex-shrink:0;
}

@media(max-width:700px){
  .app{
    padding:18px;
  }

  .header{
    height:80px;
    justify-content:flex-start;
  }

  .tituloPrincipal h1{
    font-size:23px;
  }

  .menu{
    grid-template-columns:1fr;
    gap:18px;
  }

  .card{
    height:170px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header class="header">
    <img src="logo_proveedora.webp" alt="Logo">
    <div class="tituloPrincipal">
      <h1>ALMACÉN CIGARRO</h1>
      <div>PROVSOFT</div>
    </div>
  </header>

  <main class="menu">

    <button class="card" onclick="abrirApp('index.html')">
      <div>
        <div class="icono" style="background:#dc3545;">🚬</div>
        <div class="titulo">SALIDA CIGARRO</div>
        <div class="desc">Registrar salidas del almacén.</div>
      </div>
      <div class="abrir">Abrir →</div>
    </button>

    <button class="card" onclick="abrirApp('/TABLACIG/index.html')">
      <div>
        <div class="icono" style="background:#0b6fa4;">📋</div>
        <div class="titulo">TABLA CIGARRO</div>
        <div class="desc">Consultar movimientos y existencias.</div>
      </div>
      <div class="abrir">Abrir →</div>
    </button>

  </main>

  <footer class="footer">
    Sistema PROVSOFT · CIGARRO
  </footer>

</div>

<script>
function abrirApp(url){
  window.location.href = url;
}
</script>

</body>
</html>
