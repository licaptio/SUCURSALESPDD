<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitud Intercambio | ALLENDE 1</title>

<style>
:root{
  --rojo:#c40000;
  --rojo2:#ff2b2b;
  --blanco:#ffffff;
  --gris:#f4f4f4;
  --texto:#222;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:var(--gris);
  color:var(--texto);
}

.loading{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,var(--rojo),#830000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:9999;
  transition:.4s;
}

.loading img{
  width:280px;
  max-width:90%;
  margin-bottom:25px;
}

.loading h1{
  font-size:30px;
  margin-bottom:8px;
}

.loading p{
  opacity:.9;
}

.barra-wrap{
  width:300px;
  max-width:90%;
  height:10px;
  background:rgba(255,255,255,.2);
  border-radius:30px;
  margin-top:25px;
  overflow:hidden;
}

.barra{
  width:0%;
  height:100%;
  background:white;
  transition:.3s;
}

.app{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

.header{
  background:linear-gradient(90deg,var(--rojo),#8f0000);
  color:white;
  border-radius:22px;
  padding:20px;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:20px;
}

.header img{
  width:180px;
  background:white;
  border-radius:14px;
  padding:8px;
}

.header h2{
  font-size:30px;
}

.header p{
  margin-top:5px;
  opacity:.9;
}

.box{
  background:white;
  border-radius:22px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.box h3{
  margin-bottom:15px;
  color:var(--rojo);
}

#buscar{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:2px solid #ddd;
  font-size:20px;
}

#buscar:focus{
  outline:none;
  border-color:var(--rojo);
}

.sugerencias{
  margin-top:10px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  display:none;
}

.item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{
  background:#fafafa;
}

.item b{
  color:var(--rojo);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#fafafa;
  text-align:left;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
}

input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:15px;
}

button{
  border:none;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-rojo{
  background:var(--rojo);
  color:white;
  flex:1;
}

.btn-sec{
  background:#efefef;
  color:#222;
  flex:1;
}

canvas{
  width:100%;
  height:180px;
  border:2px dashed #ccc;
  border-radius:18px;
  margin-top:12px;
  touch-action:none;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:center;
  padding:15px;
  z-index:999;
}

.modal-box{
  width:100%;
  max-width:450px;
  background:white;
  border-radius:24px;
  padding:20px;
}

.modal-box h3{
  margin-bottom:15px;
}

.modal-box button{
  width:100%;
  margin-top:10px;
}

@media(max-width:700px){
  .header{
    flex-direction:column;
    text-align:center;
  }

  .actions{
    flex-direction:column;
  }

  table{
    font-size:13px;
  }

  th,td{
    padding:8px;
  }
}
</style>
</head>

<body>

<div class="loading" id="loading">
  <img src="logo.png" onerror="this.style.display='none'">

  <h1>PROVEEDORA</h1>

  <p id="estadoCarga">
    Iniciando aplicación...
  </p>

  <div class="barra-wrap">
    <div class="barra" id="barra"></div>
  </div>
</div>

<div class="app">

  <div class="header">
    <img src="logo.png" onerror="this.style.display='none'">

    <div>
      <h2>Solicitud de Intercambio</h2>
      <p>ALLENDE 1 → ALLENDE 2</p>
    </div>
  </div>

  <div class="box">
    <h3>Buscar producto</h3>

    <input
      id="buscar"
      placeholder="Buscar código o producto..."
      autocomplete="off"
    >

    <div class="sugerencias" id="sugerencias"></div>
  </div>

  <div class="box">
    <h3>Carrito</h3>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Producto</th>
          <th>Cant.</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="tbodyCarrito"></tbody>
    </table>
  </div>

  <div class="box">
    <h3>Solicitud</h3>

    <input
      id="solicitadoPor"
      placeholder="Nombre quien solicita"
    >

    <canvas id="firma"></canvas>

    <div class="actions">
      <button
        class="btn-sec"
        onclick="guardarTemporal()"
      >
        Guardar para continuar después
      </button>

      <button
        class="btn-rojo"
        onclick="generarSolicitud()"
      >
        Solicitar intercambio
      </button>
    </div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="tituloProducto"></h3>

    <input
      type="number"
      id="cantidad"
      min="1"
      value="1"
    >

    <button
      class="btn-rojo"
      onclick="agregarProducto()"
    >
      Agregar
    </button>

    <button
      class="btn-sec"
      onclick="cerrarModal()"
    >
      Cancelar
    </button>
  </div>
</div>

<script type="module">

import {
  collection,
  getDocs,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { db } from './config.js';

let catalogo = [];
let carrito = [];
let productoActual = null;
let firmaBase64 = '';

const buscarInput = document.getElementById('buscar');
const sugerencias = document.getElementById('sugerencias');
const tbodyCarrito = document.getElementById('tbodyCarrito');

const DB_NAME = 'PROVSOFT_INTERCAMBIOS';
const DB_VERSION = 1;
const STORE_PRODUCTOS = 'catalogo_allende1';
const LS_BORRADOR = 'borrador_intercambio_a1';

function estado(txt){
  document.getElementById('estadoCarga').textContent = txt;
}

function barra(v){
  document.getElementById('barra').style.width = v + '%';
}

function normalizar(txt=''){
  return String(txt || '')
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^A-Z0-9 ]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function abrirDB(){

  return new Promise((resolve,reject)=>{

    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = e=>{

      const dbi = e.target.result;

      if(!dbi.objectStoreNames.contains(STORE_PRODUCTOS)){
        dbi.createObjectStore(
          STORE_PRODUCTOS,
          { keyPath:'id' }
        );
      }

    };

    req.onsuccess = ()=>resolve(req.result);

    req.onerror = ()=>reject(req.error);

  });

}

async function guardarCatalogoIndexedDB(data){

  const dbi = await abrirDB();

  return new Promise((resolve,reject)=>{

    const tx = dbi.transaction(
      STORE_PRODUCTOS,
      'readwrite'
    );

    const store = tx.objectStore(STORE_PRODUCTOS);

    store.clear();

    data.forEach(p=>{
      store.put(p);
    });

    tx.oncomplete = ()=>{
      dbi.close();
      resolve();
    };

    tx.onerror = ()=>{
      dbi.close();
      reject(tx.error);
    };

  });

}

async function cargarCatalogoIndexedDB(){

  const dbi = await abrirDB();

  return new Promise((resolve,reject)=>{

    const tx = dbi.transaction(
      STORE_PRODUCTOS,
      'readonly'
    );

    const store = tx.objectStore(STORE_PRODUCTOS);

    const req = store.getAll();

    req.onsuccess = ()=>{
      dbi.close();
      resolve(req.result || []);
    };

    req.onerror = ()=>{
      dbi.close();
      reject(req.error);
    };

  });

}

function textoProducto(p){

  return normalizar([
    p.codigoBarra,
    p.concepto,
    p.marca,
    p.departamento,
    ...(Array.isArray(p.codigosEquivalentes) ? p.codigosEquivalentes : [])
  ].join(' '));

}

async function cargarCatalogoFirebase(){

  estado('Descargando catálogo...');
  barra(35);

  const snap = await getDocs(
    collection(db,'productos')
  );

  const nuevoCatalogo = [];

  snap.forEach(docu=>{

    const d = docu.data();

    if(d.activo === true){

      nuevoCatalogo.push({
        id:docu.id,
        ...d
      });

    }

  });

  catalogo = nuevoCatalogo;

  estado('Guardando catálogo en IndexedDB...');
  barra(65);

  await guardarCatalogoIndexedDB(catalogo);

  barra(80);

}

function buscarProductos(){

  const q = normalizar(buscarInput.value);

  sugerencias.innerHTML = '';

  if(!q){
    sugerencias.style.display='none';
    return;
  }

  const tokens = q.split(' ').filter(Boolean);

  const resultados = catalogo
    .map(p=>{

      const texto = textoProducto(p);

      let score = 0;

      if(texto.includes(q)){
        score += 100;
      }

      tokens.forEach(t=>{
        if(texto.includes(t)){
          score += 30;
        }
      });

      return {
        ...p,
        score
      };

    })
    .filter(x=>x.score > 0)
    .sort((a,b)=>b.score - a.score)
    .slice(0,25);

  if(!resultados.length){

    sugerencias.innerHTML = `
      <div class="item">
        No se encontraron productos
      </div>
    `;

    sugerencias.style.display='block';
    return;
  }

  resultados.forEach(p=>{

    const div = document.createElement('div');

    div.className='item';

    div.innerHTML = `
      <b>${p.codigoBarra || ''}</b>
      <div>${p.concepto || ''}</div>
      <small>${p.marca || ''}</small>
    `;

    div.onclick = ()=>abrirProducto(p);

    sugerencias.appendChild(div);

  });

  sugerencias.style.display='block';

}

function abrirProducto(p){

  productoActual = p;

  document.getElementById('tituloProducto').textContent =
    p.concepto || 'Producto';

  document.getElementById('cantidad').value = 1;

  document.getElementById('modal').style.display='flex';

}

window.cerrarModal = function(){

  productoActual = null;

  document.getElementById('modal').style.display='none';

}

window.agregarProducto = function(){

  if(!productoActual){
    alert('Selecciona un producto');
    return;
  }

  const cantidad = Number(
    document.getElementById('cantidad').value
  );

  if(!cantidad || cantidad <= 0){
    alert('Cantidad inválida');
    return;
  }

  carrito.push({
    codigo: productoActual.codigoBarra || '',
    descripcion: productoActual.concepto || '',
    marca: productoActual.marca || '',
    cantidad_solicitada: cantidad,
    estado_item:'PENDIENTE'
  });

  renderCarrito();
  guardarTemporal(false);

  document.getElementById('modal').style.display='none';

  buscarInput.value='';
  sugerencias.innerHTML = '';
  sugerencias.style.display='none';
  productoActual = null;

}

function renderCarrito(){

  tbodyCarrito.innerHTML='';

  if(!carrito.length){

    tbodyCarrito.innerHTML = `
      <tr>
        <td colspan="4">
          Sin productos agregados
        </td>
      </tr>
    `;

    return;
  }

  carrito.forEach((x,i)=>{

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${x.codigo}</td>
      <td>${x.descripcion}</td>
      <td>${x.cantidad_solicitada}</td>
      <td>
        <button onclick="eliminarItem(${i})">
          X
        </button>
      </td>
    `;

    tbodyCarrito.appendChild(tr);

  });

}

window.eliminarItem = function(i){

  carrito.splice(i,1);

  renderCarrito();

  guardarTemporal(false);

}

function formularioTieneDatos(){

  const solicitadoPor = document.getElementById('solicitadoPor').value.trim();

  return carrito.length > 0 || solicitadoPor || firmaBase64;

}

window.guardarTemporal = function(mostrarAlerta = true){

  if(!formularioTieneDatos()){

    localStorage.removeItem(LS_BORRADOR);

    if(mostrarAlerta){
      alert('No hay información para guardar');
    }

    return;

  }

  const data = {
    carrito,
    solicitadoPor:document.getElementById('solicitadoPor').value,
    firma:firmaBase64,
    guardado_en:new Date().toISOString()
  };

  localStorage.setItem(
    LS_BORRADOR,
    JSON.stringify(data)
  );

  if(mostrarAlerta){
    alert('Borrador guardado');
  }

}

function recuperarTemporal(){

  const local = localStorage.getItem(
    LS_BORRADOR
  );

  if(!local){
    renderCarrito();
    return;
  }

  try{

    const data = JSON.parse(local);

    const tieneDatos =
      (Array.isArray(data.carrito) && data.carrito.length > 0) ||
      (data.solicitadoPor && String(data.solicitadoPor).trim()) ||
      data.firma;

    if(!tieneDatos){
      localStorage.removeItem(LS_BORRADOR);
      renderCarrito();
      return;
    }

    if(!confirm('Se encontró un borrador pendiente. ¿Deseas recuperarlo?')){
      localStorage.removeItem(LS_BORRADOR);
      renderCarrito();
      return;
    }

    carrito = Array.isArray(data.carrito) ? data.carrito : [];

    document.getElementById('solicitadoPor').value =
      data.solicitadoPor || '';

    firmaBase64 = data.firma || '';

    renderCarrito();

    if(firmaBase64){
      setTimeout(()=>{
        cargarFirmaEnCanvas(firmaBase64);
      },300);
    }

  }catch(e){

    console.warn('Borrador dañado', e);
    localStorage.removeItem(LS_BORRADOR);
    renderCarrito();

  }

}

function folio(){
  return 'INT-A1-' + Date.now();
}

function limpiarFormularioDespuesDeGrabar(){

  localStorage.removeItem(LS_BORRADOR);

  carrito = [];
  productoActual = null;
  firmaBase64 = '';

  document.getElementById('solicitadoPor').value = '';
  document.getElementById('buscar').value = '';
  document.getElementById('cantidad').value = 1;
  document.getElementById('tituloProducto').textContent = '';

  sugerencias.innerHTML = '';
  sugerencias.style.display = 'none';

  document.getElementById('modal').style.display = 'none';

  const canvas = document.getElementById('firma');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  renderCarrito();

}

window.generarSolicitud = async function(){

  if(!carrito.length){
    alert('Agrega productos');
    return;
  }

  const solicitadoPor = document.getElementById(
    'solicitadoPor'
  ).value.trim();

  if(!solicitadoPor){
    alert('Captura quien solicita');
    return;
  }

  const f = folio();

  const documento = {
    folio:f,
    tienda_solicita:'ALLENDE 1',
    tienda_contesta:'ALLENDE 2',
    estado:'PENDIENTE_AUTORIZAR',
    solicitado_por:solicitadoPor,
    firma_solicitud:firmaBase64,
    fecha_solicitud:serverTimestamp(),
    inventario_aplicado:false,
    items:carrito
  };

  try{

    await setDoc(
      doc(
        db,
        'TIENDAS',
        'ALLENDE 1',
        'INTERCAMBIOS',
        f
      ),
      documento
    );

    imprimir({
      ...documento,
      fecha_impresion:new Date().toLocaleString('es-MX')
    });

    limpiarFormularioDespuesDeGrabar();

    alert('Solicitud generada');

  }catch(err){

    console.error(err);
    alert('Error al generar la solicitud. Se conserva el borrador local.');
    guardarTemporal(false);

  }

}

function imprimir(docu){

  const win = window.open('');

  win.document.write(`

    <html>
    <head>
      <title>${docu.folio}</title>

      <style>
        body{
          font-family:Arial;
          padding:20px;
        }

        h2{
          margin-bottom:5px;
        }

        table{
          width:100%;
          border-collapse:collapse;
          margin-top:20px;
        }

        td,th{
          border:1px solid #ccc;
          padding:8px;
          font-size:13px;
        }

        th{
          background:#f1f1f1;
        }
      </style>
    </head>

    <body>

      <img
        src="logo.png"
        style="width:220px"
        onerror="this.style.display='none'"
      >

      <h2>Solicitud de Intercambio</h2>

      <b>Folio:</b> ${docu.folio}<br>
      <b>Solicita:</b> ALLENDE 1<br>
      <b>Contesta:</b> ALLENDE 2<br>
      <b>Estado:</b> ${docu.estado}<br>
      <b>Fecha:</b> ${docu.fecha_impresion || ''}<br><br>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Producto</th>
            <th>Cantidad</th>
          </tr>
        </thead>

        <tbody>
          ${docu.items.map(x=>`
            <tr>
              <td>${x.codigo}</td>
              <td>${x.descripcion}</td>
              <td>${x.cantidad_solicitada}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <br><br>

      <b>Solicita:</b>
      ${docu.solicitado_por}

      <br><br>

      ${
        docu.firma_solicitud
        ? `<img src="${docu.firma_solicitud}" style="width:220px">`
        : `<div style="height:80px;border-bottom:1px solid #000;width:220px"></div>`
      }

      <script>
        window.print()
      <\/script>

    </body>
    </html>

  `);

}

function cargarFirmaEnCanvas(dataUrl){

  if(!dataUrl) return;

  const canvas = document.getElementById('firma');
  const ctx = canvas.getContext('2d');
  const img = new Image();

  img.onload = ()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
  };

  img.src = dataUrl;

}

function iniciarFirma(){

  const canvas = document.getElementById('firma');
  const ctx = canvas.getContext('2d');

  let dibujando = false;

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  function pos(e){

    const r = canvas.getBoundingClientRect();

    return {
      x:(e.touches ? e.touches[0].clientX : e.clientX) - r.left,
      y:(e.touches ? e.touches[0].clientY : e.clientY) - r.top
    };

  }

  function start(e){

    e.preventDefault();

    dibujando = true;

    const p = pos(e);

    ctx.beginPath();
    ctx.moveTo(p.x,p.y);

  }

  function move(e){

    if(!dibujando) return;

    e.preventDefault();

    const p = pos(e);

    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#111';

    ctx.lineTo(p.x,p.y);
    ctx.stroke();

    firmaBase64 = canvas.toDataURL();

  }

  function end(){

    if(!dibujando) return;

    dibujando = false;

    firmaBase64 = canvas.toDataURL();

    guardarTemporal(false);

  }

  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);

  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);

}

async function init(){

  try{

    estado('Cargando catálogo local...');
    barra(10);

    const local = await cargarCatalogoIndexedDB();

    if(local.length){

      catalogo = local;

      estado(`Catálogo local cargado: ${local.length} productos`);
      barra(25);

    }else{

      estado('Sin catálogo local');

    }

    try{

      await cargarCatalogoFirebase();

    }catch(errFirebase){

      console.warn('No se pudo actualizar desde Firebase, usando catálogo local', errFirebase);

      if(!catalogo.length){
        throw errFirebase;
      }

    }

    estado('Preparando firma...');
    barra(85);

    iniciarFirma();

    estado('Recuperando borrador...');
    barra(90);

    recuperarTemporal();

    estado('Aplicación lista');
    barra(100);

    setTimeout(()=>{

      document.getElementById('loading').style.opacity='0';

      setTimeout(()=>{

        document.getElementById('loading').style.display='none';

      },400);

    },500);

  }catch(err){

    console.error(err);

    estado('Error cargando aplicación');

    alert(
      'Error cargando aplicación. Revisa consola.'
    );

  }

}

buscarInput.addEventListener(
  'input',
  buscarProductos
);

window.onload = init;

</script>

</body>
</html>
