<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROVSOFT - Menú Inicio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.contenedor{
    width:95%;
    max-width:900px;
}

.titulo{
    text-align:center;
    margin-bottom:30px;
}

.titulo h1{
    color:#222;
    font-size:32px;
}

.titulo p{
    color:#666;
    margin-top:10px;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    transition:.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
}

.icono{
    font-size:48px;
    margin-bottom:15px;
}

.card h2{
    color:#222;
    margin-bottom:10px;
}

.card p{
    color:#666;
    margin-bottom:20px;
}

.boton{
    display:inline-block;
    background:#1976d2;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="contenedor">

    <div class="titulo">
        <h1>PROVSOFT</h1>
        <p>Menú Principal</p>
    </div>

    <div class="menu">

        <div class="card">
            <div class="icono">📦</div>
            <h2>Salida Bodega Liquidación</h2>
            <p>Captura y consulta de salidas.</p>
<a class="boton"
   href="./APPSALIDALIQ/index.html">
   Abrir
</a>
        </div>

    </div>

</div>

</body>
</html>
